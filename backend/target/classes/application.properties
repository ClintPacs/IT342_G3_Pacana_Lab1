# ============================================
# BrewBatch - Application Configuration
# ============================================

# Server
server.port=8080

# ── Database ──────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/brewbatch_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────
# Replace with a strong, random 256-bit (32+ char) secret in production
app.jwt.secret=BrewBatchSuperSecretKeyForJWTSigningMustBe256BitsLong!
app.jwt.expiration-ms=86400000

# ── Logging ───────────────────────────────
logging.level.com.brewbatch=DEBUG
logging.level.org.springframework.security=INFO
